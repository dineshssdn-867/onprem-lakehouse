<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#78909C"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4CAF50"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#FFA726"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#AB47BC"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="660" rx="12" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="1"/>

  <!-- Title -->
  <text x="30" y="35" font-size="20" font-weight="700" fill="#212529">Recommendation System - Data Lakehouse Architecture</text>
  <text x="30" y="52" font-size="11" fill="#868E96">Polaris (Iceberg REST Catalog) | Trino | Spark | dbt | MLflow | Superset | Streamlit</text>

  <!-- SECTION: Data Sources -->
  <rect x="20" y="70" width="120" height="160" rx="8" fill="white" stroke="#DEE2E6" filter="url(#shadow)"/>
  <text x="80" y="90" font-size="11" font-weight="600" fill="#495057" text-anchor="middle">Data Sources</text>
  <rect x="35" y="100" width="90" height="36" rx="5" fill="#FFF3E0" stroke="#FFA726"/>
  <text x="80" y="123" font-size="10" fill="#E65100" text-anchor="middle">Synthetic JSON</text>
  <rect x="35" y="145" width="90" height="36" rx="5" fill="#FFEBEE" stroke="#EF5350"/>
  <text x="80" y="162" font-size="10" fill="#C62828" text-anchor="middle">MinIO</text>
  <text x="80" y="175" font-size="8" fill="#C62828" text-anchor="middle">s3://raw-data</text>
  <rect x="35" y="190" width="90" height="28" rx="5" fill="#E8F5E9" stroke="#66BB6A"/>
  <text x="80" y="209" font-size="9" fill="#2E7D32" text-anchor="middle">generate_data.py</text>

  <!-- Arrow: Sources to Ingestion -->
  <line x1="145" y1="150" x2="175" y2="150" stroke="#78909C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SECTION: Data Lakehouse -->
  <rect x="180" y="70" width="470" height="340" rx="8" fill="white" stroke="#DEE2E6" filter="url(#shadow)"/>
  <text x="415" y="90" font-size="12" font-weight="700" fill="#212529" text-anchor="middle">Data Lakehouse</text>

  <!-- Ingestion -->
  <rect x="195" y="100" width="130" height="80" rx="6" fill="#E8F5E9" stroke="#66BB6A"/>
  <text x="260" y="118" font-size="10" font-weight="600" fill="#2E7D32" text-anchor="middle">Ingestion</text>
  <text x="260" y="136" font-size="14" font-weight="700" fill="#1B5E20" text-anchor="middle">Spark</text>
  <text x="260" y="152" font-size="8" fill="#558B2F" text-anchor="middle">PySpark to Iceberg tables</text>
  <text x="260" y="165" font-size="8" fill="#558B2F" text-anchor="middle">Writes to Polaris catalog</text>

  <!-- Arrow: Ingestion to Bronze -->
  <line x1="260" y1="185" x2="260" y2="205" stroke="#78909C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Medallion layers -->
  <rect x="195" y="210" width="130" height="45" rx="5" fill="#EFEBE9" stroke="#A1887F"/>
  <text x="260" y="228" font-size="11" font-weight="700" fill="#4E342E" text-anchor="middle">Bronze</text>
  <text x="260" y="245" font-size="8" fill="#6D4C41" text-anchor="middle">restaurant, user, review, tip, checkin</text>

  <!-- Transformation -->
  <rect x="360" y="100" width="130" height="80" rx="6" fill="#FFF3E0" stroke="#FFA726"/>
  <text x="425" y="118" font-size="10" font-weight="600" fill="#E65100" text-anchor="middle">Transformation</text>
  <text x="425" y="136" font-size="14" font-weight="700" fill="#BF360C" text-anchor="middle">dbt-trino</text>
  <text x="425" y="152" font-size="8" fill="#E65100" text-anchor="middle">SQL models via Trino</text>
  <text x="425" y="165" font-size="8" fill="#E65100" text-anchor="middle">Bronze &gt; Silver &gt; Gold</text>

  <!-- Arrow: Bronze to Silver (via dbt-trino) -->
  <line x1="330" y1="233" x2="355" y2="233" stroke="#FFA726" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <!-- dbt-trino label on Bronze-to-Silver arrow -->
  <text x="343" y="225" font-size="7" fill="#E65100" text-anchor="middle">dbt</text>

  <!-- Arrow: dbt-trino box down to Silver -->
  <line x1="425" y1="185" x2="425" y2="205" stroke="#FFA726" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrow-orange)"/>

  <rect x="360" y="210" width="130" height="45" rx="5" fill="#ECEFF1" stroke="#90A4AE"/>
  <text x="425" y="228" font-size="11" font-weight="700" fill="#37474F" text-anchor="middle">Silver</text>
  <text x="425" y="245" font-size="8" fill="#546E7A" text-anchor="middle">dim_user, dim_restaurant, fact_review</text>

  <!-- Arrow: Silver to Gold (via dbt-trino) -->
  <line x1="495" y1="233" x2="510" y2="233" stroke="#FFA726" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <!-- dbt-trino label on Silver-to-Gold arrow -->
  <text x="503" y="225" font-size="7" fill="#E65100" text-anchor="middle">dbt</text>

  <rect x="515" y="210" width="120" height="45" rx="5" fill="#FFF8E1" stroke="#FFD54F"/>
  <text x="575" y="228" font-size="11" font-weight="700" fill="#F57F17" text-anchor="middle">Gold</text>
  <text x="575" y="245" font-size="8" fill="#F9A825" text-anchor="middle">analyses_review</text>

  <!-- Catalog and Compute Layer -->
  <rect x="195" y="275" width="210" height="55" rx="6" fill="#E0F2F1" stroke="#26A69A"/>
  <text x="300" y="293" font-size="9" font-weight="600" fill="#00695C" text-anchor="middle">Catalog (Iceberg REST API)</text>
  <text x="300" y="313" font-size="16" font-weight="700" fill="#004D40" text-anchor="middle">Apache Polaris</text>
  <text x="300" y="325" font-size="8" fill="#00796B" text-anchor="middle">PostgreSQL backend | OAuth2</text>

  <rect x="420" y="275" width="215" height="55" rx="6" fill="#E3F2FD" stroke="#42A5F5"/>
  <text x="527" y="293" font-size="9" font-weight="600" fill="#1565C0" text-anchor="middle">Query Engine (Reads)</text>
  <text x="527" y="313" font-size="16" font-weight="700" fill="#0D47A1" text-anchor="middle">Trino</text>
  <text x="527" y="325" font-size="8" fill="#1976D2" text-anchor="middle">Iceberg REST catalog via Polaris</text>

  <!-- Storage -->
  <rect x="195" y="345" width="440" height="50" rx="6" fill="#FFEBEE" stroke="#EF5350"/>
  <text x="415" y="365" font-size="9" font-weight="600" fill="#B71C1C" text-anchor="middle">Object Storage (S3-compatible)</text>
  <text x="415" y="383" font-size="16" font-weight="700" fill="#C62828" text-anchor="middle">MinIO - s3://lakehouse/</text>

  <!-- SECTION: ML Pipeline -->
  <rect x="180" y="425" width="470" height="100" rx="8" fill="white" stroke="#DEE2E6" filter="url(#shadow)"/>
  <text x="415" y="445" font-size="12" font-weight="700" fill="#212529" text-anchor="middle">Machine Learning Pipeline</text>

  <rect x="195" y="455" width="120" height="55" rx="5" fill="#F3E5F5" stroke="#AB47BC"/>
  <text x="255" y="475" font-size="10" font-weight="600" fill="#6A1B9A" text-anchor="middle">Feature Store</text>
  <text x="255" y="490" font-size="8" fill="#7B1FA2" text-anchor="middle">Spark to Iceberg table</text>
  <text x="255" y="500" font-size="8" fill="#7B1FA2" text-anchor="middle">feature_store.review</text>

  <line x1="320" y1="483" x2="340" y2="483" stroke="#78909C" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="345" y="455" width="120" height="55" rx="5" fill="#F3E5F5" stroke="#AB47BC"/>
  <text x="405" y="475" font-size="10" font-weight="600" fill="#6A1B9A" text-anchor="middle">Model Training</text>
  <text x="405" y="490" font-size="8" fill="#7B1FA2" text-anchor="middle">Spark MLlib (ALS)</text>

  <line x1="470" y1="483" x2="490" y2="483" stroke="#78909C" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="495" y="455" width="140" height="55" rx="5" fill="#E8EAF6" stroke="#5C6BC0"/>
  <text x="565" y="475" font-size="10" font-weight="600" fill="#283593" text-anchor="middle">Experiment Tracking</text>
  <text x="565" y="492" font-size="14" font-weight="700" fill="#1A237E" text-anchor="middle">MLflow</text>
  <text x="565" y="504" font-size="8" fill="#3949AB" text-anchor="middle">PostgreSQL + MinIO artifacts</text>

  <!-- SECTION: Serving and Visualization -->

  <!-- BI and Analytics -->
  <rect x="680" y="70" width="160" height="130" rx="8" fill="white" stroke="#DEE2E6" filter="url(#shadow)"/>
  <text x="760" y="92" font-size="10" font-weight="600" fill="#495057" text-anchor="middle">BI and Analytics</text>
  <rect x="695" y="102" width="130" height="50" rx="5" fill="#E0F7FA" stroke="#00ACC1"/>
  <text x="760" y="124" font-size="13" font-weight="700" fill="#006064" text-anchor="middle">Apache Superset</text>
  <text x="760" y="140" font-size="8" fill="#00838F" text-anchor="middle">:8088 - Dashboards via Trino</text>
  <rect x="695" y="158" width="62" height="30" rx="4" fill="#FFCDD2" stroke="#EF9A9A"/>
  <text x="726" y="177" font-size="8" font-weight="600" fill="#C62828" text-anchor="middle">Redis</text>
  <rect x="763" y="158" width="62" height="30" rx="4" fill="#E0F7FA" stroke="#80DEEA"/>
  <text x="794" y="177" font-size="8" font-weight="600" fill="#006064" text-anchor="middle">Celery</text>

  <!-- Arrow: Trino to Superset -->
  <line x1="640" y1="300" x2="690" y2="130" stroke="#78909C" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Recommendation App -->
  <rect x="680" y="220" width="160" height="100" rx="8" fill="white" stroke="#DEE2E6" filter="url(#shadow)"/>
  <text x="760" y="242" font-size="10" font-weight="600" fill="#495057" text-anchor="middle">Recommendation App</text>
  <rect x="695" y="252" width="130" height="50" rx="5" fill="#E8F5E9" stroke="#66BB6A"/>
  <text x="760" y="274" font-size="13" font-weight="700" fill="#1B5E20" text-anchor="middle">Streamlit</text>
  <text x="760" y="290" font-size="8" fill="#2E7D32" text-anchor="middle">:8051 - User-facing app</text>

  <!-- Arrow: Trino to Streamlit -->
  <line x1="640" y1="305" x2="690" y2="275" stroke="#78909C" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Model Serving (next to ML Pipeline for clean MLflow arrow) -->
  <rect x="680" y="340" width="160" height="100" rx="8" fill="white" stroke="#DEE2E6" filter="url(#shadow)"/>
  <text x="760" y="362" font-size="10" font-weight="600" fill="#495057" text-anchor="middle">Model Serving</text>
  <rect x="695" y="372" width="130" height="50" rx="5" fill="#FCE4EC" stroke="#EC407A"/>
  <text x="760" y="394" font-size="13" font-weight="700" fill="#880E4F" text-anchor="middle">Flask API</text>
  <text x="760" y="410" font-size="8" fill="#AD1457" text-anchor="middle">:5001 - ALS predictions</text>

  <!-- Arrow: MLflow to Flask API -->
  <line x1="640" y1="483" x2="690" y2="400" stroke="#AB47BC" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="660" y="435" font-size="7" fill="#6A1B9A" text-anchor="middle">model</text>

  <!-- Arrow: Flask API up to Streamlit -->
  <line x1="760" y1="340" x2="760" y2="325" stroke="#4CAF50" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="772" y="335" font-size="7" fill="#2E7D32">predictions</text>

  <!-- SECTION: Orchestration (future) -->
  <rect x="680" y="460" width="160" height="70" rx="8" fill="white" stroke="#DEE2E6" filter="url(#shadow)" stroke-dasharray="4,3"/>
  <text x="760" y="483" font-size="10" font-weight="600" fill="#9E9E9E" text-anchor="middle">Orchestration (Phase 2)</text>
  <rect x="695" y="493" width="130" height="28" rx="5" fill="#F5F5F5" stroke="#BDBDBD" stroke-dasharray="3,2"/>
  <text x="760" y="512" font-size="13" font-weight="600" fill="#9E9E9E" text-anchor="middle">Kestra</text>

  <!-- SECTION: Legend -->
  <rect x="870" y="70" width="210" height="260" rx="8" fill="white" stroke="#DEE2E6" filter="url(#shadow)"/>
  <text x="975" y="92" font-size="11" font-weight="700" fill="#212529" text-anchor="middle">Legend</text>

  <rect x="885" y="105" width="14" height="14" rx="3" fill="#E8F5E9" stroke="#66BB6A"/>
  <text x="905" y="116" font-size="9" fill="#495057">Spark (Write path)</text>

  <rect x="885" y="128" width="14" height="14" rx="3" fill="#E3F2FD" stroke="#42A5F5"/>
  <text x="905" y="139" font-size="9" fill="#495057">Trino (Read path)</text>

  <rect x="885" y="151" width="14" height="14" rx="3" fill="#FFF3E0" stroke="#FFA726"/>
  <text x="905" y="162" font-size="9" fill="#495057">dbt-trino (Transforms)</text>

  <rect x="885" y="174" width="14" height="14" rx="3" fill="#E0F2F1" stroke="#26A69A"/>
  <text x="905" y="185" font-size="9" fill="#495057">Polaris (Iceberg Catalog)</text>

  <rect x="885" y="197" width="14" height="14" rx="3" fill="#FFEBEE" stroke="#EF5350"/>
  <text x="905" y="208" font-size="9" fill="#495057">MinIO (Object Storage)</text>

  <rect x="885" y="220" width="14" height="14" rx="3" fill="#F3E5F5" stroke="#AB47BC"/>
  <text x="905" y="231" font-size="9" fill="#495057">ML Pipeline</text>

  <rect x="885" y="243" width="14" height="14" rx="3" fill="#E0F7FA" stroke="#00ACC1"/>
  <text x="905" y="254" font-size="9" fill="#495057">Superset + Celery (BI)</text>

  <rect x="885" y="266" width="14" height="14" rx="3" fill="#FFCDD2" stroke="#EF9A9A"/>
  <text x="905" y="277" font-size="9" fill="#495057">Redis (Message Broker)</text>

  <rect x="885" y="289" width="14" height="14" rx="3" fill="#F5F5F5" stroke="#BDBDBD" stroke-dasharray="3,2"/>
  <text x="905" y="300" font-size="9" fill="#9E9E9E">Planned (Phase 2)</text>

  <!-- Port summary -->
  <rect x="870" y="345" width="210" height="210" rx="8" fill="white" stroke="#DEE2E6" filter="url(#shadow)"/>
  <text x="975" y="365" font-size="11" font-weight="700" fill="#212529" text-anchor="middle">Ports</text>
  <text x="885" y="385" font-size="9" fill="#495057" font-family="monospace">MinIO       :9000/:9001</text>
  <text x="885" y="400" font-size="9" fill="#495057" font-family="monospace">Polaris     :8181</text>
  <text x="885" y="415" font-size="9" fill="#495057" font-family="monospace">Trino       :8080</text>
  <text x="885" y="430" font-size="9" fill="#495057" font-family="monospace">PostgreSQL  :5432</text>
  <text x="885" y="445" font-size="9" fill="#495057" font-family="monospace">Spark       :7077</text>
  <text x="885" y="460" font-size="9" fill="#495057" font-family="monospace">MLflow      :5000</text>
  <text x="885" y="475" font-size="9" fill="#495057" font-family="monospace">Model API   :5001</text>
  <text x="885" y="490" font-size="9" fill="#495057" font-family="monospace">Superset    :8088</text>
  <text x="885" y="505" font-size="9" fill="#495057" font-family="monospace">Redis       :6379</text>
  <text x="885" y="520" font-size="9" fill="#495057" font-family="monospace">Streamlit   :8051</text>

  <!-- Data flow label -->
  <text x="30" y="650" font-size="9" fill="#ADB5BD">Data flow: JSON &gt; MinIO &gt; Spark (Iceberg writes) &gt; Polaris (catalog) &gt; Trino (reads) &gt; dbt (transforms) &gt; Superset/Streamlit (visualization)</text>
</svg>
