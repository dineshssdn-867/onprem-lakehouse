<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 680" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bronze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4A460"/>
      <stop offset="100%" stop-color="#CD853F"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D3D3D3"/>
      <stop offset="100%" stop-color="#A9A9A9"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="680" rx="12" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Title -->
  <text x="30" y="42" font-size="22" font-weight="700" fill="#1a1a1a">Data Lakehouse</text>
  <text x="30" y="62" font-size="11" fill="#888">(Current Architecture)</text>

  <!-- Quality Layer -->
  <rect x="20" y="80" width="480" height="100" rx="8" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="36" y="102" font-size="12" fill="#666" font-weight="600">Quality Layer</text>

  <!-- Bronze -->
  <rect x="60" y="112" width="80" height="50" rx="6" fill="url(#bronze)"/>
  <text x="100" y="142" font-size="13" font-weight="600" fill="white" text-anchor="middle">Bronze</text>

  <!-- Arrow -->
  <line x1="150" y1="137" x2="195" y2="137" stroke="#999" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#999"/>
  </marker>

  <!-- Silver -->
  <rect x="205" y="112" width="80" height="50" rx="6" fill="url(#silver)"/>
  <text x="245" y="142" font-size="13" font-weight="600" fill="white" text-anchor="middle">Silver</text>

  <!-- Arrow -->
  <line x1="295" y1="137" x2="340" y2="137" stroke="#999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Gold -->
  <rect x="350" y="112" width="80" height="50" rx="6" fill="url(#gold)"/>
  <text x="390" y="142" font-size="13" font-weight="600" fill="white" text-anchor="middle">Gold</text>

  <!-- Table Format -->
  <rect x="20" y="195" width="480" height="80" rx="8" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="36" y="218" font-size="12" fill="#666" font-weight="600">Table Format</text>
  <text x="260" y="248" font-size="20" font-weight="700" fill="#4A90D9" text-anchor="middle">Apache Iceberg</text>

  <!-- Catalog -->
  <rect x="20" y="290" width="480" height="80" rx="8" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="36" y="313" font-size="12" fill="#666" font-weight="600">Catalog (REST API)</text>
  <text x="260" y="343" font-size="20" font-weight="700" fill="#2D6B4F" text-anchor="middle">Apache Polaris</text>

  <!-- Compute Engines -->
  <rect x="20" y="385" width="480" height="100" rx="8" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="36" y="408" font-size="12" fill="#666" font-weight="600">Compute Engines</text>

  <!-- Spark box -->
  <rect x="50" y="418" width="140" height="50" rx="6" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
  <text x="120" y="440" font-size="13" font-weight="600" fill="#2E7D32" text-anchor="middle">Apache Spark</text>
  <text x="120" y="456" font-size="9" fill="#558B2F" text-anchor="middle">Writes (Ingestion + ML)</text>

  <!-- Trino box -->
  <rect x="220" y="418" width="140" height="50" rx="6" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
  <text x="290" y="440" font-size="13" font-weight="600" fill="#1565C0" text-anchor="middle">Trino</text>
  <text x="290" y="456" font-size="9" fill="#1976D2" text-anchor="middle">Reads (dbt + BI + App)</text>

  <!-- dbt box -->
  <rect x="380" y="418" width="100" height="50" rx="6" fill="#FFF3E0" stroke="#FFA726" stroke-width="1"/>
  <text x="430" y="440" font-size="13" font-weight="600" fill="#E65100" text-anchor="middle">dbt-trino</text>
  <text x="430" y="456" font-size="9" fill="#EF6C00" text-anchor="middle">Transforms</text>

  <!-- Data Lake -->
  <rect x="20" y="500" width="480" height="80" rx="8" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="36" y="523" font-size="12" fill="#666" font-weight="600">Object Storage (S3)</text>
  <text x="260" y="553" font-size="20" font-weight="700" fill="#C62828" text-anchor="middle">MinIO</text>

  <!-- Backend -->
  <rect x="20" y="595" width="480" height="70" rx="8" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="36" y="618" font-size="12" fill="#666" font-weight="600">Backend Store</text>
  <text x="260" y="645" font-size="18" font-weight="700" fill="#1565C0" text-anchor="middle">PostgreSQL</text>
  <text x="260" y="658" font-size="9" fill="#666" text-anchor="middle">(Polaris metadata + MLflow experiments + Superset metadata)</text>
</svg>
